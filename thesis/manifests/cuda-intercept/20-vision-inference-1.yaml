apiVersion: batch/v1
kind: Job
metadata:
  name: thesis-vision-inference-1
  labels:
    benchmark.hami.io/plan: thesis
    benchmark.hami.io/mode: cuda-intercept
    benchmark.hami.io/workload: vision-inference
    benchmark.hami.io/tier: production
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: thesis
        benchmark.hami.io/mode: cuda-intercept
        benchmark.hami.io/workload: vision-inference
        benchmark.hami.io/tier: production
    spec:
      restartPolicy: Never
      schedulerName: hami-scheduler
      containers:
        - name: worker
          image: hami-cuda-intercept-runtime:local
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              marker_dir=/shared-intercept/markers
              marker="$marker_dir/$WORKLOAD_TASK_NAME"
              mkdir -p "$marker_dir"
              touch "$marker"
              touch /shared-intercept/high-priority.active
              cleanup() {
                rm -f "$marker"
                if [ -z "$(find "$marker_dir" -mindepth 1 -maxdepth 1 -print -quit)" ]; then
                  rm -f /shared-intercept/high-priority.active
                fi
              }
              trap cleanup EXIT INT TERM
              python /workloads/thesis_workload.py
          env:
            - name: LD_PRELOAD
              value: /opt/cuda-intercept/libcuda_intercept.so
            - name: CUDA_INTERCEPT_TASK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CUDA_INTERCEPT_MEMORY_LIMIT_MIB
              value: "0"
            - name: CUDA_INTERCEPT_KERNEL_DELAY_US
              value: "0"
            - name: CUDA_INTERCEPT_PAUSE_FILE
              value: ""
            - name: CUDA_INTERCEPT_LOG_PATH
              value: /tmp/cuda-intercept.log
            - name: WORKLOAD_TASK_NAME
              value: thesis-vision-inference-1
            - name: WORKLOAD_PRIORITY_TIER
              value: production
            - name: WORKLOAD_KIND
              value: vision-inference
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "45"
            - name: WORKLOAD_RESERVE_MIB
              value: "1500"
            - name: WORKLOAD_BATCH_SIZE
              value: "16"
          resources:
            requests:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "1800"
              nvidia.com/gpucores: "24"
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "1800"
              nvidia.com/gpucores: "24"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
            - name: shared-intercept
              mountPath: /shared-intercept
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-thesis-workloads
        - name: shared-intercept
          hostPath:
            path: /tmp/hami-benchmark-thesis-intercept
            type: DirectoryOrCreate
