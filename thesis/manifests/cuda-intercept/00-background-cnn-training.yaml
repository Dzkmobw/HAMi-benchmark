apiVersion: batch/v1
kind: Job
metadata:
  name: thesis-background-cnn-training
  labels:
    benchmark.hami.io/plan: thesis
    benchmark.hami.io/mode: cuda-intercept
    benchmark.hami.io/workload: background-cnn-training
    benchmark.hami.io/tier: opportunistic
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: thesis
        benchmark.hami.io/mode: cuda-intercept
        benchmark.hami.io/workload: background-cnn-training
        benchmark.hami.io/tier: opportunistic
    spec:
      restartPolicy: Never
      schedulerName: hami-scheduler
      containers:
        - name: worker
          image: hami-cuda-intercept-runtime:local
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              rm -f /shared-intercept/high-priority.active
              rm -rf /shared-intercept/markers
              mkdir -p /shared-intercept/markers
              python /workloads/thesis_workload.py
          env:
            - name: LD_PRELOAD
              value: /opt/cuda-intercept/libcuda_intercept.so
            - name: CUDA_INTERCEPT_TASK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CUDA_INTERCEPT_MEMORY_LIMIT_MIB
              value: "0"
            - name: CUDA_INTERCEPT_KERNEL_DELAY_US
              value: "2000"
            - name: CUDA_INTERCEPT_PAUSE_FILE
              value: /shared-intercept/high-priority.active
            - name: CUDA_INTERCEPT_LOG_PATH
              value: /tmp/cuda-intercept.log
            - name: WORKLOAD_TASK_NAME
              value: thesis-background-cnn-training
            - name: WORKLOAD_PRIORITY_TIER
              value: opportunistic
            - name: WORKLOAD_KIND
              value: background-cnn-training
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "120"
            - name: WORKLOAD_RESERVE_MIB
              value: "2500"
            - name: WORKLOAD_BATCH_SIZE
              value: "64"
          resources:
            requests:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "3200"
              nvidia.com/gpucores: "30"
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "3200"
              nvidia.com/gpucores: "30"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
            - name: shared-intercept
              mountPath: /shared-intercept
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-thesis-workloads
        - name: shared-intercept
          hostPath:
            path: /tmp/hami-benchmark-thesis-intercept
            type: DirectoryOrCreate
