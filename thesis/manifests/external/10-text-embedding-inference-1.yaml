apiVersion: batch/v1
kind: Job
metadata:
  name: thesis-text-embedding-inference-1
  labels:
    benchmark.hami.io/plan: thesis
    benchmark.hami.io/mode: external
    benchmark.hami.io/workload: text-embedding-inference
    benchmark.hami.io/tier: production
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: thesis
        benchmark.hami.io/mode: external
        benchmark.hami.io/workload: text-embedding-inference
        benchmark.hami.io/tier: production
      annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: latency-sensitive
        external-scheduler.hami.io/runtime-seconds: "25"
        external-scheduler.hami.io/gpu-mem-mib: "900"
    spec:
      restartPolicy: Never
      schedulerName: hami-scheduler
      containers:
        - name: worker
          image: hami-cuda-intercept-runtime:local
          imagePullPolicy: IfNotPresent
          command: ["python", "/workloads/thesis_workload.py"]
          env:
            - name: LD_PRELOAD
              value: /opt/cuda-intercept/libcuda_intercept.so
            - name: CUDA_INTERCEPT_TASK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CUDA_INTERCEPT_MEMORY_LIMIT_MIB
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-memory-limit-mib']
            - name: CUDA_INTERCEPT_KERNEL_DELAY_US
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-kernel-delay-us']
            - name: CUDA_INTERCEPT_PAUSE_FILE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-pause-file']
            - name: CUDA_INTERCEPT_LOG_PATH
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-log-path']
            - name: WORKLOAD_TASK_NAME
              value: thesis-text-embedding-inference-1
            - name: WORKLOAD_PRIORITY_TIER
              value: production
            - name: WORKLOAD_KIND
              value: text-embedding-inference
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "25"
            - name: WORKLOAD_RESERVE_MIB
              value: "700"
            - name: WORKLOAD_BATCH_SIZE
              value: "256"
          resources:
            requests:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "900"
              nvidia.com/gpucores: "12"
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "900"
              nvidia.com/gpucores: "12"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-thesis-workloads
