apiVersion: batch/v1
kind: Job
metadata:
  name: thesis-vision-inference-1
  labels:
    benchmark.hami.io/plan: thesis
    benchmark.hami.io/mode: external
    benchmark.hami.io/workload: vision-inference
    benchmark.hami.io/tier: production
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: thesis
        benchmark.hami.io/mode: external
        benchmark.hami.io/workload: vision-inference
        benchmark.hami.io/tier: production
      annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: throughput
        external-scheduler.hami.io/runtime-seconds: "45"
        external-scheduler.hami.io/gpu-mem-mib: "1800"
    spec:
      restartPolicy: Never
      schedulerName: hami-scheduler
      containers:
        - name: worker
          image: hami-cuda-intercept-runtime:pause-v2
          imagePullPolicy: IfNotPresent
          command: ["python", "/workloads/thesis_workload.py"]
          env:
            - name: LD_PRELOAD
              value: /opt/cuda-intercept/libcuda_intercept.so
            - name: CUDA_INTERCEPT_TASK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKLOAD_TASK_NAME
              value: thesis-vision-inference-1
            - name: WORKLOAD_PRIORITY_TIER
              value: production
            - name: WORKLOAD_KIND
              value: vision-inference
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "45"
            - name: WORKLOAD_RESERVE_MIB
              value: "1800"
            - name: WORKLOAD_BATCH_SIZE
              value: "48"
            - name: WORKLOAD_DATA_ROOT
              value: /data
            - name: TORCH_HOME
              value: /data/torch-cache
            - name: WORKLOAD_USE_PRETRAINED_VISION
              value: "1"
          resources:
            requests:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "2800"
              nvidia.com/gpucores: "20"
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "2800"
              nvidia.com/gpucores: "20"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
            - name: benchmark-data
              mountPath: /data
            - name: benchmark-control
              mountPath: /control
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-thesis-workloads
        - name: benchmark-data
          hostPath:
            path: /var/lib/hami-benchmark-data
            type: DirectoryOrCreate
        - name: benchmark-control
          hostPath:
            path: /var/lib/hami-benchmark-control
            type: DirectoryOrCreate
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
