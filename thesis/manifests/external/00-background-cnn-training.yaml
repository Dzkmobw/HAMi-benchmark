apiVersion: batch/v1
kind: Job
metadata:
  name: thesis-background-cnn-training
  labels:
    benchmark.hami.io/plan: thesis
    benchmark.hami.io/mode: external
    benchmark.hami.io/workload: background-cnn-training
    benchmark.hami.io/tier: opportunistic
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: thesis
        benchmark.hami.io/mode: external
        benchmark.hami.io/workload: background-cnn-training
        benchmark.hami.io/tier: opportunistic
      annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: background
        external-scheduler.hami.io/runtime-seconds: "120"
        external-scheduler.hami.io/gpu-mem-mib: "3200"
    spec:
      restartPolicy: Never
      schedulerName: hami-scheduler
      containers:
        - name: worker
          image: hami-cuda-intercept-runtime:local
          imagePullPolicy: IfNotPresent
          command: ["python", "/workloads/thesis_workload.py"]
          env:
            - name: LD_PRELOAD
              value: /opt/cuda-intercept/libcuda_intercept.so
            - name: CUDA_INTERCEPT_TASK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKLOAD_TASK_NAME
              value: thesis-background-cnn-training
            - name: WORKLOAD_PRIORITY_TIER
              value: opportunistic
            - name: WORKLOAD_KIND
              value: background-cnn-training
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "120"
            - name: WORKLOAD_RESERVE_MIB
              value: "2500"
            - name: WORKLOAD_BATCH_SIZE
              value: "64"
          resources:
            requests:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "3200"
              nvidia.com/gpucores: "30"
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "3200"
              nvidia.com/gpucores: "30"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-thesis-workloads
