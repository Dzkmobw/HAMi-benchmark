apiVersion: batch/v1
kind: Job
metadata:
  name: mini-medium-inference-1
  labels:
    benchmark.hami.io/plan: mini
    benchmark.hami.io/mode: external
    benchmark.hami.io/workload: medium-inference
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: mini
        benchmark.hami.io/mode: external
        benchmark.hami.io/workload: medium-inference
      annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: throughput
        external-scheduler.hami.io/runtime-seconds: "80"
        external-scheduler.hami.io/gpu-mem-mib: "1800"
    spec:
      schedulingGates:
        - name: external-scheduler.hami.io/admission
      restartPolicy: Never
      containers:
        - name: worker
          image: hami-cuda-intercept-runtime:local
          imagePullPolicy: IfNotPresent
          command: ["python", "/workloads/mini_workload.py"]
          env:
            - name: LD_PRELOAD
              value: /opt/cuda-intercept/libcuda_intercept.so
            - name: CUDA_INTERCEPT_TASK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CUDA_INTERCEPT_MEMORY_LIMIT_MIB
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-memory-limit-mib']
            - name: CUDA_INTERCEPT_KERNEL_DELAY_US
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-kernel-delay-us']
            - name: CUDA_INTERCEPT_PAUSE_FILE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-pause-file']
            - name: CUDA_INTERCEPT_LOG_PATH
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['external-scheduler.hami.io/intercept-log-path']
            - name: WORKLOAD_KIND
              value: medium-inference
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "80"
            - name: WORKLOAD_RESERVE_MIB
              value: "1200"
            - name: WORKLOAD_BATCH_SIZE
              value: "8"
          resources:
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "1800"
              nvidia.com/gpucores: "20"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-mini-workloads
---
