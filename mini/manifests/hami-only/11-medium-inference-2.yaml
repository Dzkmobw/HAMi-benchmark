apiVersion: batch/v1
kind: Job
metadata:
  name: mini-medium-inference-2
  labels:
    benchmark.hami.io/plan: mini
    benchmark.hami.io/mode: hami-only
    benchmark.hami.io/workload: medium-inference
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        benchmark.hami.io/plan: mini
        benchmark.hami.io/mode: hami-only
        benchmark.hami.io/workload: medium-inference
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: pytorch/pytorch:2.5.1-cuda12.1-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          command: ["python", "/workloads/mini_workload.py"]
          env:
            - name: WORKLOAD_KIND
              value: medium-inference
            - name: WORKLOAD_RUNTIME_SECONDS
              value: "80"
            - name: WORKLOAD_RESERVE_MIB
              value: "1200"
            - name: WORKLOAD_BATCH_SIZE
              value: "8"
          resources:
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpumem: "1800"
              nvidia.com/gpucores: "20"
          volumeMounts:
            - name: workloads
              mountPath: /workloads
      volumes:
        - name: workloads
          configMap:
            name: hami-benchmark-mini-workloads
---
