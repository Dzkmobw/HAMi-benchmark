benchmark:
  name: single-4070super-mini-round
  objective:
    primary:
      - average_completion_time
      - gpu_utilization
      - gpu_memory_utilization
  cluster:
    gpu_model: RTX_4070_SUPER
    gpu_count: 1
    runtime: minikube_plus_hami
  expected_duration_minutes: 3_to_6
  mix:
    short_inference: 3
    medium_inference: 1
    background_training: 1
  workloads:
    - name: short-inference
      purpose: quick_latency_validation
      recommended_real_task: sentence_embedding_inference
      scheduler_annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: latency-sensitive
        external-scheduler.hami.io/runtime-seconds: "20"
        external-scheduler.hami.io/gpu-mem-mib: "800"
      hami_resources:
        nvidia.com/gpu: "1"
        nvidia.com/gpumem: "800"
        nvidia.com/gpucores: "20"
    - name: medium-inference
      purpose: quick_utilization_validation
      recommended_real_task: yolov8n_inference
      scheduler_annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: throughput
        external-scheduler.hami.io/runtime-seconds: "60"
        external-scheduler.hami.io/gpu-mem-mib: "1800"
      hami_resources:
        nvidia.com/gpu: "1"
        nvidia.com/gpumem: "1800"
        nvidia.com/gpucores: "30"
    - name: background-training
      purpose: short_interference_probe
      recommended_real_task: cifar10_resnet18_training
      scheduler_annotations:
        external-scheduler.hami.io/enabled: "true"
        external-scheduler.hami.io/class: background
        external-scheduler.hami.io/runtime-seconds: "180"
        external-scheduler.hami.io/gpu-mem-mib: "3000"
      hami_resources:
        nvidia.com/gpu: "1"
        nvidia.com/gpumem: "3000"
        nvidia.com/gpucores: "40"
  submission_pattern:
    arrival_window_seconds: 15
    order:
      - background-training
      - medium-inference
      - short-inference
      - short-inference
      - short-inference
  comparison_modes:
    - hami_only
    - hami_plus_external_scheduler
